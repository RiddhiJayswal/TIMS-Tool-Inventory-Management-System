# /etc/nginx/sites-available/tims
# Symlink to enable: ln -s /etc/nginx/sites-available/tims /etc/nginx/sites-enabled/tims
# Then: sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tims.riddhijayswal.com;

    return 301 https://$host$request_uri;
}

# HTTPS — proxy to the TIMS frontend container
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tims.riddhijayswal.com;

    # Certificates managed by Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/tims.riddhijayswal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tims.riddhijayswal.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Forward everything to the TIMS frontend container on port 3001
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Support large file uploads if needed
        client_max_body_size 20M;
    }
}
